</body>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Careless Player</title>

<style>

body{
margin:0;
background:black;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* FRAME */

#main-frame{
position:relative;
width:100%;
max-width:1000px;
aspect-ratio:16/9;
overflow:hidden;
border-radius:20px;
}

:fullscreen #main-frame{
width:100vw;
height:100vh;
max-width:none;
border-radius:0;
}

/* BACKGROUND */

#bg-img{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(20px) brightness(0.6);
}

/* GLASS */

#glass{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:85%;
height:75%;
border-radius:20px;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.1),
rgba(255,255,255,0.03)
);

backdrop-filter:blur(30px);

padding:35px;

display:flex;
align-items:center;
justify-content:space-between;
}

/* LEFT */

#left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

/* RIGHT IMAGE */

#right{
width:260px;
height:260px;

background-size:cover;
background-position:center;

border-radius:18px;

margin-left:30px;
}

:fullscreen #right{
width:340px;
height:340px;
}

/* CARELESS */

#brand{
color:#ff2a2a;
font-weight:800;
font-size:18px;
margin-bottom:6px;
}

/* TITLE */

#title{
font-size:36px;
font-weight:900;
color:white;
line-height:1.1;
margin-bottom:20px;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;

overflow:hidden;
outline:none;
}

/* SEEK */

.seek-wrap{
display:flex;
align-items:center;
gap:10px;
}

.time{
color:white;
font-size:13px;
min-width:45px;
}

.seek{
flex:1;
height:6px;
background:rgba(255,255,255,0.25);
border-radius:10px;
appearance:none;
outline:none;
overflow:hidden;
}

.seek::-webkit-slider-thumb{
appearance:none;
width:12px;
height:12px;
background:#ff2a2a;
border-radius:50%;
cursor:pointer;
box-shadow:-1000px 0 0 1000px #ff2a2a;
}

/* VISUALIZER */

#visualizer{
display:flex;
align-items:flex-end;
gap:4px;
height:40px;
margin-bottom:15px;
}

.bar{
width:4px;
height:10px;
background:white;
border-radius:2px;
animation:jump 1s infinite ease-in-out;
}

.bar:nth-child(2){ animation-delay:0.1s }
.bar:nth-child(3){ animation-delay:0.2s }
.bar:nth-child(4){ animation-delay:0.3s }
.bar:nth-child(5){ animation-delay:0.4s }
.bar:nth-child(6){ animation-delay:0.5s }
.bar:nth-child(7){ animation-delay:0.6s }

@keyframes jump{
0%,100%{ height:10px }
50%{ height:35px }
}

/* BUTTONS */

.controls{
margin-top:15px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
width:100%;
max-width:1000px;
}

.btn{
background:white;
border:none;
padding:12px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

#fullscreenBtn{
margin-top:12px;
background:white;
border:none;
padding:14px;
border-radius:10px;
font-weight:800;
cursor:pointer;
width:100%;
max-width:1000px;
}

</style>

</head>

<body>

<div id="main-frame">

<div id="bg-img"></div>

<div id="glass">

<div id="left">

<div id="brand">
CARELESS
</div>

<!-- VISUALIZER -->

<div id="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div id="title" contenteditable="true">
Select Song
</div>

<div class="seek-wrap">

<div id="current" class="time">
00:00
</div>

<input
type="range"
min="0"
max="100"
value="0"
class="seek"
id="seek">

<div id="duration" class="time">
00:00
</div>

</div>

</div>

<div id="right"></div>

</div>

</div>

<div class="controls">

<label class="btn">
Set Background
<input
type="file"
id="bg-in"
accept="image/*"
style="display:none">
</label>

<label class="btn">
Right Image
<input
type="file"
id="img-in"
accept="image/*"
style="display:none">
</label>

<label class="btn">
Choose Song
<input
type="file"
id="audio-in"
accept="audio/*"
style="display:none">
</label>

</div>

<button id="fullscreenBtn">
Full Screen
</button>

<audio id="audio"></audio>

<script>

const audio=document.getElementById("audio");
const seek=document.getElementById("seek");
const current=document.getElementById("current");
const duration=document.getElementById("duration");
const title=document.getElementById("title");

function formatTime(sec){
let m=Math.floor(sec/60);
let s=Math.floor(sec%60);
if(s<10)s="0"+s;
return m+":"+s;
}

/* AUDIO */

document.getElementById("audio-in").onchange=(e)=>{

const file=e.target.files[0];

audio.src=URL.createObjectURL(file);

/* AUTO TITLE */

let name=file.name
.replace(".mp3","")
.replace(".wav","")
.replace(".m4a","");

title.innerText=name;

audio.onloadedmetadata=()=>{
duration.innerText=formatTime(audio.duration);
};

audio.play();

};

/* UPDATE */

audio.ontimeupdate=()=>{

seek.value=
(audio.currentTime/audio.duration)*100;

current.innerText=
formatTime(audio.currentTime);

};

/* SEEK */

seek.oninput=()=>{
audio.currentTime=
(seek.value/100)*audio.duration;
};

/* BACKGROUND */

document.getElementById("bg-in").onchange=(e)=>{

const url=
URL.createObjectURL(e.target.files[0]);

document.getElementById("bg-img")
.style.backgroundImage=`url(${url})`;

};

/* RIGHT IMAGE */

document.getElementById("img-in").onchange=(e)=>{

const url=
URL.createObjectURL(e.target.files[0]);

document.getElementById("right")
.style.backgroundImage=`url(${url})`;

};

/* FULLSCREEN */

document.getElementById("fullscreenBtn").onclick=()=>{

document.getElementById("main-frame")
.requestFullscreen();

};

</script>

</body>

</html></html>
