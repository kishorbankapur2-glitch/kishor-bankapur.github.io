<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Careless Timetable · Swipe to Delete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #e9eff5 0%, #dce5ef 100%);
            min-height: 100vh;
            padding: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* MAIN CARD - premium glass */
        .timetable-card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.6);
            padding: 2rem;
            transition: all 0.2s;
        }

        .careless-title {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(125deg, #1a3a4c, #2c6285, #1e4a62);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border-left: 7px solid #e67e22;
            padding-left: 1.2rem;
            margin-bottom: 0.1rem;
        }

        .info-strip {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            background: #f5f9ff;
            padding: 0.7rem 1.3rem;
            border-radius: 100px;
            margin: 1.2rem 0 1.8rem 0;
            box-shadow: inset 0 1px 2px #ffffff, 0 4px 8px rgba(0,0,0,0.02);
        }

        .calendar-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
        }

        input[type="date"] {
            border: none;
            background: #f0f4fa;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-family: 'SF Mono', monospace;
            font-size: 0.9rem;
        }

        .day-pill {
            background: #2c3e50;
            color: white;
            padding: 0.55rem 1.5rem;
            border-radius: 100px;
            font-weight: 700;
            box-shadow: 0 3px 0 #141f2a;
        }

        .live-time {
            background: #1e2f3c;
            color: #eef5ff;
            padding: 0.5rem 1.3rem;
            border-radius: 60px;
            font-family: 'SF Mono', monospace;
            font-weight: 600;
            margin-left: auto;
        }

        .timetable-swipe-container {
            overflow: hidden;
            border-radius: 1.5rem;
            background: #ffffff;
            border: 1px solid #eef2f8;
        }

        .swipe-item {
            position: relative;
            width: 100%;
            border-bottom: 1px solid #ecf3f9;
            background: #e74c3c; /* Background color revealed on swipe */
        }

        .swipe-row-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1rem;
            background: white;
            position: relative;
            z-index: 2;
            touch-action: pan-y;
            user-select: none;
        }

        .swipe-delete-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            z-index: 1;
        }

        .subject-cell { font-weight: 700; color: #1a3f55; flex: 2; }
        .time-cell { font-family: 'SF Mono', monospace; background: #f5faff; padding: 0.25rem 1rem; border-radius: 40px; margin-right: 1rem; }

        .status-pill {
            min-width: 120px;
            padding: 0.55rem 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #9aaebf;
            transform: translateY(-2px);
            transition: 0.1s;
        }

        .status-pill.completed { background: #c2f0cf; color: #166534; box-shadow: 0 5px 0 #6f9e7c; }
        .status-pill.not-completed { background: #ffe2db; color: #b1321e; box-shadow: 0 5px 0 #c28b7c; }
        .status-pill:active { transform: translateY(2px); box-shadow: 0 0px 0 transparent; }

        .action-group { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }
        .uniform-btn {
            background: #2c5f6e; border: none; color: white; font-weight: 700; padding: 0.7rem 1.5rem;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #1a3a44;
        }
        .uniform-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 transparent; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card { background: white; width: 90%; max-width: 400px; padding: 2rem; border-radius: 2rem; }
        .modal-card input, .modal-card select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border-radius: 50px; border: 1px solid #ddd; }

        @media (max-width: 700px) {
            .careless-title { font-size: 2.2rem; }
            .live-time { margin-left: 0; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div class="timetable-card">
    <div class="careless-title">Careless Time Table</div>

    <div class="info-strip">
        <div class="calendar-box">
            <label>📅</label>
            <input type="date" id="calendarSelect">
        </div>
        <div class="day-pill" id="dayPill">--</div>
        <div class="live-time" id="liveClock">00:00:00 AM</div>
    </div>

    <div class="timetable-swipe-container">
        <div id="swipeList"></div>
    </div>

    <div class="action-group">
        <button class="uniform-btn" onclick="clearAllTasks()">🗑 Clear All</button>
        <button class="uniform-btn" onclick="openModal()">+ Add Task</button>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <h3>New Task</h3>
        <input type="text" id="subjectInput" placeholder="Subject Name">
        <div style="display:flex; gap:5px;">
            <select id="hourSelect"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option selected>12</option></select>
            <select id="minuteSelect"><option>00</option><option>15</option><option>30</option><option>45</option></select>
            <select id="ampmSelect"><option>AM</option><option>PM</option></select>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeModal()" style="background:#eee; border:none; padding:10px 20px; border-radius:20px;">Cancel</button>
            <button onclick="onSave()" style="background:#2c5f6e; color:white; border:none; padding:10px 20px; border-radius:20px;">Save</button>
        </div>
    </div>
</div>

<script>
    let baseTasks = [];
    let completionMap = {};
    let currentDate = "";
    let audioCtx = null;

    function playTinSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 800; gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } catch(e) {}
    }

    function save() { localStorage.setItem("careless_v2", JSON.stringify({baseTasks, completionMap})); }
    
    function load() {
        const data = JSON.parse(localStorage.getItem("careless_v2") || "{}");
        baseTasks = data.baseTasks || [];
        completionMap = data.completionMap || {};
    }

    function renderSwipeList() {
        const container = document.getElementById('swipeList');
        if (baseTasks.length === 0) {
            container.innerHTML = '<div style="padding:2rem; text-align:center; color:#888;">No tasks. Swipe left to delete once added!</div>';
            return;
        }
        container.innerHTML = baseTasks.map(t => {
            const isDone = completionMap[`${currentDate}_${t.id}`];
            return `
                <div class="swipe-item">
                    <div class="swipe-delete-bg">🗑 Delete</div>
                    <div class="swipe-row-content" data-id="${t.id}">
                        <div class="subject-cell">${t.subject}</div>
                        <div style="display:flex; align-items:center;">
                            <span class="time-cell">${t.time}</span>
                            <div class="status-pill ${isDone?'completed':'not-completed'}" onclick="toggleDone('${t.id}')">
                                ${isDone?'Completed ✓':'Not completed'}
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('');

        document.querySelectorAll('.swipe-row-content').forEach(el => attachSwipe(el));
    }

    function attachSwipe(el) {
        let startX = 0, currentX = 0;
        el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; el.style.transition = 'none'; }, {passive: true});
        el.addEventListener('touchmove', e => {
            currentX = e.touches[0].clientX - startX;
            if (currentX > 0) currentX = 0;
            if (currentX < -100) currentX = -100;
            el.style.transform = `translateX(${currentX}px)`;
        }, {passive: true});
        el.addEventListener('touchend', () => {
            el.style.transition = 'transform 0.3s ease';
            if (currentX < -70) {
                el.style.transform = 'translateX(-100%)';
                setTimeout(() => {
                    baseTasks = baseTasks.filter(t => t.id != el.dataset.id);
                    save(); renderSwipeList(); playTinSound();
                }, 200);
            } else {
                el.style.transform = 'translateX(0px)';
            }
        });
    }

    function toggleDone(id) {
        const key = `${currentDate}_${id}`;
        completionMap[key] = !completionMap[key];
        save(); renderSwipeList(); playTinSound();
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('active'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

    function onSave() {
        const sub = document.getElementById('subjectInput').value;
        if (!sub) return;
        const time = `${document.getElementById('hourSelect').value}:${document.getElementById('minuteSelect').value} ${document.getElementById('ampmSelect').value}`;
        baseTasks.push({id: Date.now(), subject: sub, time: time});
        save(); renderSwipeList(); closeModal();
    }

    function clearAllTasks() { if(confirm("Clear everything?")) { baseTasks = []; completionMap = {}; save(); renderSwipeList(); } }

    function init() {
        load();
        const dateInput = document.getElementById('calendarSelect');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        currentDate = today;
        dateInput.onchange = (e) => { currentDate = e.target.value; updateDayPill(); renderSwipeList(); };
        
        const updateDayPill = () => {
            const d = new Date(currentDate + "T12:00:00");
            document.getElementById('dayPill').innerText = d.toLocaleDateString('en-US', {weekday:'long'});
        };

        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);

        updateDayPill();
        renderSwipeList();
    }

    init();
</script>
</body>
</html>
