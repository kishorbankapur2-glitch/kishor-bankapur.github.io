<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player & Downloader</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#1c1c1e,#000);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro",sans-serif;
    color:white;
}

.card{
    width:92%;
    max-width:420px;
    padding:25px;
    border-radius:25px;
    background:rgba(28,28,30,0.85);
    backdrop-filter:blur(20px);
}

h1{ text-align:center; margin-bottom:18px; font-size: 22px; }

.input-wrapper{
    display:flex;
    flex-direction: column;
    gap:10px;
    margin-bottom:14px;
}

input{
    width: 100%;
    box-sizing: border-box;
    padding:14px;
    border-radius:14px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

.btn-row { display: flex; gap: 10px; }

button {
    flex: 1;
    padding:14px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.play-btn { background:#0A84FF; }
.down-btn { background:#34C759; }

#video-container{
    margin-top:12px;
    display:none;
    width:100%;
    aspect-ratio:16/9;
    border-radius:16px;
    overflow:hidden;
    background:#000;
}

iframe{ width:100%; height:100%; border:none; }
</style>
</head>

<body>

<div class="card">
    <h1>YouTube No Ads</h1>

    <div class="input-wrapper">
        <input type="text" id="videoUrl" placeholder="Paste link (youtu.be or youtube.com)">
        <div class="btn-row">
            <button class="play-btn" onclick="loadVideo()">Play</button>
            <button class="down-btn" onclick="downloadVideo()">Download</button>
        </div>
    </div>

    <div id="video-container">
        <iframe id="player" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
</div>

<script>
// Is function se hum kisi bhi type ke link se Video ID nikaal sakte hain
function getYouTubeID(url) {
    const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
    const match = url.match(regex);
    return (match && match[1]) ? match[1] : null;
}

function loadVideo(){
    const url = document.getElementById('videoUrl').value.trim();
    const vId = getYouTubeID(url);

    if(vId){
        document.getElementById('player').src = `https://www.youtube.com/embed/${vId}?autoplay=1&rel=0`;
        document.getElementById('video-container').style.display="block";
    } else {
        alert("Sahi YouTube link daalo bhai.");
    }
}

function downloadVideo(){
    const url = document.getElementById('videoUrl').value.trim();
    const vId = getYouTubeID(url);

    if(vId){
        // Yahan link ko convert kiya ja raha hai
        // Example: https://ssyoutube.com/watch?v=cA2jfLr-IhE
        const finalDownloadLink = `https://ssyoutube.com/watch?v=${vId}`;
        window.open(finalDownloadLink, '_blank');
    } else {
        alert("Pehle link toh copy-paste karo!");
    }
}
</script>

</body>
</html>
