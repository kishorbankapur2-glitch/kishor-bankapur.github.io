<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careless Player + Fixed Lyrics Panel</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* FRAME */
#main-frame {
    position: relative;
    width: 100%;
    max-width: 1000px;
    aspect-ratio: 16/9;
    overflow: hidden;
    border-radius: 20px;
}

:fullscreen #main-frame {
    width: 100vw;
    height: 100vh;
    max-width: none;
    border-radius: 0;
}

/* BACKGROUND */
#bg-img {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(20px) brightness(0.6);
}

/* GLASS */
#glass {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
    height: 75%;
    border-radius: 20px;
    background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
    backdrop-filter: blur(30px);
    padding: 35px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* LEFT */
#left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* RIGHT IMAGE */
#right {
    width: 260px;
    height: 260px;
    background-size: cover;
    background-position: center;
    border-radius: 18px;
    margin-left: 30px;
}

:fullscreen #right {
    width: 340px;
    height: 340px;
}

/* BRAND */
#brand {
    color: #ff2a2a;
    font-weight: 800;
    font-size: 18px;
    margin-bottom: 6px;
}

/* TITLE */
#title {
    font-size: 36px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 10px;
    outline: none;
}

/* LYRICS */
#lyricsBox {
    margin-top: 10px;
    height: 150px;
    overflow: hidden;
    color: white;
    font-size: 24px;
    line-height: 50px;
    text-align: center;
}

.lyric-line {
    opacity: 0.4;
    transition: 0.3s;
    font-size: 24px;
}

.active {
    opacity: 1;
    font-weight: 900;
    font-size: 32px;
    color: #ff2a2a;
}

/* SEEK */
.seek-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
}

.time {
    color: white;
    font-size: 13px;
    min-width: 45px;
}

.seek {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    appearance: none;
    outline: none;
    overflow: hidden;
}

.seek::-webkit-slider-thumb {
    appearance: none;
    width: 12px;
    height: 12px;
    background: #ff2a2a;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: -1000px 0 0 1000px #ff2a2a;
}

/* VISUALIZER */
#visualizer {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 40px;
    margin-bottom: 15px;
}

.bar {
    width: 4px;
    height: 10px;
    background: white;
    border-radius: 2px;
    animation: jump 1s infinite ease-in-out;
}

.bar:nth-child(2) { animation-delay: 0.1s }
.bar:nth-child(3) { animation-delay: 0.2s }
.bar:nth-child(4) { animation-delay: 0.3s }
.bar:nth-child(5) { animation-delay: 0.4s }
.bar:nth-child(6) { animation-delay: 0.5s }
.bar:nth-child(7) { animation-delay: 0.6s }

@keyframes jump {
    0%,100% { height:10px }
    50% { height:35px }
}

/* BUTTONS */
.controls {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 1000px;
}

.btn {
    background: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
    background: #ff2a2a;
    color: #fff;
}

#fullscreenBtn {
    margin-top: 12px;
    background: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    max-width: 1000px;
    transition: 0.2s;
}

#fullscreenBtn:hover {
    transform: scale(1.05);
    background: #ff2a2a;
    color: #fff;
}

/* MODAL PREMIUM STYLE */
#lyricsModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    overflow: auto;
    padding: 20px;
}

#closeModal {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 24px;
    font-weight: bold;
    padding: 12px 16px;
    background: #ff2a2a;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#lyricsModal textarea {
    width: 100%;
    margin-top: 10px;
}

.main-layout {
    display: flex;
    flex: 1;
    gap: 8px;
    min-height: 0;
    margin-top: 10px;
}

#lyricsSource {
    flex: 1;
    background: #1c1c1e;
    border-radius: 8px;
    overflow-y: auto;
    padding: 10px;
    border: 1px solid #333;
}

.line-item { font-size: 15px; padding: 6px 0; opacity: 0.2; transition: 0.3s; border-bottom: 1px solid #2c2c2e; }
.line-item.highlight { opacity: 1; color: #34c759; font-weight: bold; }

#lrcOutput {
    flex: 1;
    background: #000;
    color: #32d74b;
    border-radius: 8px;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    overflow-y: auto;
    border: 1px solid #333;
}

.secondary-btns { display: flex; gap: 8px; margin-top:10px; }
.secondary-btns .btn { flex: 1; }
.next-btn { width: 100%; padding: 18px; font-size: 20px; margin-top:10px; }
</style>
</head>

<body>

<div id="main-frame">
    <div id="bg-img"></div>
    <div id="glass">
        <div id="left">
            <div id="brand">CARELESS</div>
            <div id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <div id="title" contenteditable="true">Select Song</div>
            <div id="lyricsBox"></div>
            <div class="seek-wrap">
                <div id="current" class="time">00:00</div>
                <input type="range" min="0" max="100" value="0" class="seek" id="seek">
                <div id="duration" class="time">00:00</div>
            </div>
        </div>
        <div id="right"></div>
    </div>
</div>

<div class="controls">
    <label class="btn">Set Background
        <input type="file" id="bg-in" accept="image/*" style="display:none">
    </label>
    <label class="btn">Right Image
        <input type="file" id="img-in" accept="image/*" style="display:none">
    </label>
    <label class="btn">Choose Song
        <input type="file" id="audio-in" accept="audio/*" style="display:none">
    </label>
    <button class="btn" id="lyricsBtn">Lyrics</button>
    <button class="btn" id="lyricsSyncBtn">Fixed Lyrics Panel</button>
</div>

<button id="fullscreenBtn">Full Screen</button>

<audio id="audio"></audio>

<!-- MODAL -->
<div id="lyricsModal">
    <button id="closeModal">✖</button>
    <textarea id="rawInput" placeholder="Paste lyrics here..."></textarea>
    <div class="main-layout">
        <div id="lyricsSource">Load lyrics...</div>
        <div id="lrcOutput">Result will appear here...</div>
    </div>
    <div class="secondary-btns">
        <button class="btn btn-load" onclick="loadLyrics()">LOAD LYRICS</button>
        <button class="btn btn-copy" onclick="copyResult()">COPY RESULT 📋</button>
    </div>
    <button class="next-btn" onclick="syncLine()">NEXT LINE ⏭️</button>
</div>

<script>
// Main Player
const audio=document.getElementById("audio");
const seek=document.getElementById("seek");
const current=document.getElementById("current");
const duration=document.getElementById("duration");
const title=document.getElementById("title");

let lyrics=[];

function formatTime(sec){
    let m=Math.floor(sec/60);
    let s=Math.floor(sec%60);
    if(s<10)s="0"+s;
    return m+":"+s;
}

document.getElementById("audio-in").onchange=(e)=>{
    const file=e.target.files[0];
    audio.src=URL.createObjectURL(file);
    let name=file.name.replace(".mp3","").replace(".wav","").replace(".m4a","");
    title.innerText=name;
    audio.onloadedmetadata=()=>{ duration.innerText=formatTime(audio.duration); };
    audio.play();
};

seek.oninput=()=>{ audio.currentTime=(seek.value/100)*audio.duration; };

document.getElementById("bg-in").onchange=(e)=>{
    const url=URL.createObjectURL(e.target.files[0]);
    document.getElementById("bg-img").style.backgroundImage=`url(${url})`;
};

document.getElementById("img-in").onchange=(e)=>{
    const url=URL.createObjectURL(e.target.files[0]);
    document.getElementById("right").style.backgroundImage=`url(${url})`;
};

document.getElementById("fullscreenBtn").onclick=()=>{ document.getElementById("main-frame").requestFullscreen(); };

document.getElementById("lyricsBtn").onclick=()=>{
    let text=prompt("Paste timed lyrics:");
    if(!text) return;
    lyrics=[];
    const lines=text.split("\n");
    lines.forEach(line=>{
        let match=line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
        if(match){ let min=parseInt(match[1]); let sec=parseFloat(match[2]); lyrics.push({ time:min*60+sec, text:match[3] }); }
    });
    displayLyrics();
};

function displayLyrics(){
    const box=document.getElementById("lyricsBox");
    box.innerHTML="";
    lyrics.forEach(l=>{
        let div=document.createElement("div");
        div.className="lyric-line";
        div.innerText=l.text;
        box.appendChild(div);
    });
}

audio.ontimeupdate=()=>{
    seek.value=(audio.currentTime/audio.duration)*100;
    current.innerText=formatTime(audio.currentTime);
    const lines=document.querySelectorAll(".lyric-line");
    let index=0;
    lyrics.forEach((l,i)=>{ if(audio.currentTime>=l.time) index=i; });
    lines.forEach(el=>el.classList.remove("active"));
    if(lines[index]){ lines[index].classList.add("active"); lines[index].scrollIntoView({behavior:"smooth",block:"center"}); }
};

// Modal
const lyricsModal=document.getElementById('lyricsModal');
const lyricsSyncBtn=document.getElementById('lyricsSyncBtn');
const closeModal=document.getElementById('closeModal');

lyricsSyncBtn.onclick=()=>{
    lyricsModal.style.display='block';
    // audio synced silently, no controls/seek bar
};

closeModal.onclick=()=>{ lyricsModal.style.display='none'; };

// Fixed Lyrics Panel JS
const lyricsSource=document.getElementById('lyricsSource');
const lrcOutput=document.getElementById('lrcOutput');
const rawInput=document.getElementById('rawInput');

let lines = [];
let currentIndex = 0;

function loadLyrics(){
    const text=rawInput.value.trim();
    if(!text){ alert("Enter lyrics first!"); return; }
    lines=text.split('\n').map(l=>l.trim()).filter(l=>l!=="");
    lyricsSource.innerHTML="";
    lrcOutput.innerText="";
    currentIndex=0;
    lines.forEach((line,i)=>{
        const div=document.createElement('div');
        div.className='line-item';
        div.id='L-'+i;
        div.innerText=line;
        lyricsSource.appendChild(div);
    });
    if(lines.length>0) highlightLine(0);
}

function syncLine(){
    if(currentIndex<lines.length){
        const time=audio.currentTime; // main audio synced
        const mins=Math.floor(time/60).toString().padStart(2,'0');
        const secs=Math.floor(time%60).toString().padStart(2,'0');
        const ms=Math.floor((time%1)*100).toString().padStart(2,'0');
        const timestamp=`[${mins}:${secs}.${ms}]`;
        lrcOutput.innerText+=timestamp+" "+lines[currentIndex]+"\n";
        currentIndex++;
        if(currentIndex<lines.length) highlightLine(currentIndex);
    }
}

function highlightLine(index){
    document.querySelectorAll('.line-item').forEach(el=>el.classList.remove('highlight'));
    const active=document.getElementById('L-'+index);
    if(!active) return;
    active.classList.add('highlight');
    const containerHeight=lyricsSource.offsetHeight;
    const itemTop=active.offsetTop-lyricsSource.offsetTop;
    lyricsSource.scrollTo({top:itemTop-(containerHeight/2), behavior:'smooth'});
}

function copyResult(){
    const text=lrcOutput.innerText;
    if(!text || text.startsWith("Result")){ alert("Nothing to copy!"); return; }
    navigator.clipboard.writeText(text).then(()=>alert("LRC copied!")).catch(()=>{
        const el=document.createElement('textarea');
        el.value=text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("LRC copied!");
    });
}
</script>

</body>
</html>
