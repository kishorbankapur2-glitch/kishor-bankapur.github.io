<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player & Downloader</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #1c1c1e, #000);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
    color: white;
}

.card {
    width: 92%;
    max-width: 420px;
    padding: 25px;
    border-radius: 25px;
    background: rgba(28, 28, 30, 0.85);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 { text-align: center; margin-bottom: 18px; font-size: 22px; }

.input-wrapper {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
}

.input-box {
    position: relative;
    width: 100%;
}

input {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    padding-right: 80px; /* Space for the button */
    border-radius: 14px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    outline: none;
    font-size: 14px;
}

#pasteBtn, #clearBtn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    right: 8px;
    padding: 6px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
}

#pasteBtn {
    background: #0A84FF;
    color: white;
}

#clearBtn {
    background: #ff3b30;
    color: white;
    display: none;
}

.btn-row { display: flex; gap: 10px; }

button.action-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
}

button.action-btn:active { opacity: 0.7; }

.play-btn { background: #0A84FF; }
.down-btn { background: #34C759; }

#video-container {
    margin-top: 15px;
    display: none;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

iframe { width: 100%; height: 100%; border: none; }
</style>
</head>

<body>

<div class="card">
    <h1>YouTube No Ads</h1>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="videoUrl" placeholder="Paste link (youtu.be or youtube.com)" oninput="toggleClear()">
            <button id="pasteBtn" onclick="pasteText()">Paste</button>
            <button id="clearBtn" onclick="clearInput()">✕</button>
        </div>

        <div class="btn-row">
            <button class="action-btn play-btn" onclick="loadVideo()">Play</button>
            <button class="action-btn down-btn" onclick="downloadVideo()">Download</button>
        </div>
    </div>

    <div id="video-container">
        <iframe id="player" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
</div>

<script>
// Extract YouTube ID from various URL formats
function getYouTubeID(url) {
    const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
    const match = url.match(regex);
    return (match && match[1]) ? match[1] : null;
}

// Load video using the yout-ube.com bypass domain
function loadVideo(){
    const url = document.getElementById('videoUrl').value.trim();
    const vId = getYouTubeID(url);

    if(vId){
        // Changed to yout-ube.com as requested
        document.getElementById('player').src = `https://www.yout-ube.com/embed/${vId}?autoplay=1&rel=0`;
        document.getElementById('video-container').style.display = "block";
    } else {
        alert("Sahi YouTube link daalo bhai.");
    }
}

// Redirect to download service
function downloadVideo(){
    const url = document.getElementById('videoUrl').value.trim();
    const vId = getYouTubeID(url);

    if(vId){
        const finalDownloadLink = `https://ssyoutube.com/watch?v=${vId}`;
        window.open(finalDownloadLink, '_blank');
    } else {
        alert("Pehle link toh paste karo!");
    }
}

// Paste from clipboard (requires user permission)
async function pasteText(){
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById("videoUrl").value = text;
        toggleClear();
    } catch(err) {
        alert("Clipboard access allow karo (check browser permissions).");
    }
}

// Clear input field
function clearInput(){
    document.getElementById("videoUrl").value = "";
    document.getElementById('video-container').style.display = "none";
    document.getElementById('player').src = "";
    toggleClear();
}

// Toggle between Paste and Clear buttons
function toggleClear(){
    const input = document.getElementById("videoUrl").value;
    const clearBtn = document.getElementById("clearBtn");
    const pasteBtn = document.getElementById("pasteBtn");

    if(input.length > 0){
        clearBtn.style.display = "block";
        pasteBtn.style.display = "none";
    } else {
        clearBtn.style.display = "none";
        pasteBtn.style.display = "block";
    }
}
</script>

</body>
</html>
